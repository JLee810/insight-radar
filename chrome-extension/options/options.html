<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>InsightRadar — Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0A1628; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; padding: 32px; }
    .container { max-width: 540px; margin: 0 auto; }
    .logo { display: flex; align-items: center; gap: 8px; margin-bottom: 28px; }
    .logo span { font-size: 18px; font-weight: 700; color: #fff; }
    h2 { font-size: 13px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
    .card { background: #0D1F3C; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 16px; margin-bottom: 20px; }
    label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; }
    input, select { width: 100%; background: #0A1628; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 9px 12px; font-size: 13px; color: #e2e8f0; outline: none; margin-bottom: 4px; }
    input:focus, select:focus { border-color: rgba(0,229,255,0.5); box-shadow: 0 0 0 2px rgba(0,229,255,0.1); }
    .hint { font-size: 11px; color: #475569; margin-bottom: 12px; }
    .btn { background: #00E5FF; color: #0A1628; border: none; border-radius: 8px; padding: 9px 20px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn:hover { background: #00B8D4; }
    .status { font-size: 12px; margin-top: 8px; color: #4ade80; display: none; }
    .status.error { color: #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00E5FF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 2a14.5 14.5 0 0 0 0 20A14.5 14.5 0 0 0 12 2"/>
        <path d="M2 12h20"/>
      </svg>
      <span>InsightRadar Settings</span>
    </div>

    <h2>Server Connection</h2>
    <div class="card">
      <label for="server-url">Backend Server URL</label>
      <input type="url" id="server-url" placeholder="http://localhost:3001" />
      <p class="hint">The URL where your InsightRadar Node.js server is running.</p>
      <button class="btn" id="btn-test">Test Connection</button>
      <p class="status" id="conn-status"></p>
    </div>

    <h2>Dashboard</h2>
    <div class="card">
      <label for="dashboard-url">Dashboard URL</label>
      <input type="url" id="dashboard-url" placeholder="http://localhost:5173" />
      <p class="hint">The URL for the React dashboard (opened by "Open Dashboard" button).</p>
    </div>

    <button class="btn" id="btn-save">Save Settings</button>
    <p class="status" id="save-status"></p>
  </div>
  <script src="options.js"></script>
</body>
</html>
