*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1rem 0}
.tabs{display:flex;gap:8px;margin-bottom:1.5rem;flex-wrap:wrap}
.tab{padding:6px 16px;border:0.5px solid var(--color-border-secondary);border-radius:20px;background:transparent;cursor:pointer;font-size:13px;color:var(--color-text-secondary);transition:all .15s}
.tab.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary)}
.stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px}
.stat-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:4px}
.stat-val{font-size:20px;font-weight:500}
.stat-sub{font-size:11px;color:var(--color-text-tertiary);margin-top:2px}
.kw-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.kw{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);gap:8px}
.kw-text{font-size:13px;color:var(--color-text-primary);flex:1}
.kw-bar-wrap{width:60px;height:4px;background:var(--color-border-tertiary);border-radius:2px;flex-shrink:0}
.kw-bar{height:4px;border-radius:2px}
.kw-num{font-size:11px;color:var(--color-text-tertiary);min-width:28px;text-align:right;flex-shrink:0}
.cat-head{font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase;color:var(--color-text-secondary);margin-bottom:10px}
.export-btn{margin-top:1.5rem;padding:8px 20px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:transparent;cursor:pointer;font-size:13px;color:var(--color-text-primary)}
.export-btn:hover{background:var(--color-background-secondary)}
</style>
<div class="wrap">

<div class="stats">

let current='ALL';
function show(cat){
  current=cat;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.textContent===(cat==='ALL'?'All':cat)));
  render();
}
function render(){
  const filtered=current==='ALL'?KW:KW.filter(k=>k.category===current);
  const grid=document.getElementById('grid');
  if(current==='ALL'){
    const cats=['POLITICS','GLOBAL AFFAIRS','SOCIO-ECONOMIC','EDUCATION'];
    grid.style.display='block';
    grid.innerHTML=cats.map(cat=>{
      const items=KW.filter(k=>k.category===cat);
      return `<div style="margin-bottom:1.5rem">
        <div class="cat-head" style="color:${COLORS[cat]}">${cat} — ${items.length} keywords</div>
        <div class="kw-grid">${items.map(kwCard).join('')}</div>
      </div>`;
    }).join('');
  } else {
    grid.style.display='grid';
    grid.innerHTML=filtered.map(kwCard).join('');
  }
}
function kwCard(k){
  const pct=Math.round(k.weight*100);
  const col=COLORS[k.category];
  return `<div class="kw">
    <span class="kw-text">${k.keyword}</span>
    <div class="kw-bar-wrap"><div class="kw-bar" style="width:${pct}%;background:${col}"></div></div>
    <span class="kw-num">${k.weight.toFixed(1)}</span>
  </div>`;
}
function exportJSON(){
  const blob=new Blob([JSON.stringify(KW,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='keywords.json';
  a.click();
}
render();
